services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                          # OPENAI_API_KEY, JWT_SECRET, etc. — never baked into image
    environment:
      # Absolute path inside the db_data volume so the DB persists across restarts
      DATABASE_URL: sqlite+pysqlite:////data/student_assistant.db
    volumes:
      - db_data:/data                 # SQLite database persistence
      - uploads_data:/uploads     # uploaded room images
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
  uploads_data:
